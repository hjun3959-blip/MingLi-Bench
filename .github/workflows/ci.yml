name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-checks:
    name: Python 检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff==0.15.17" pip-audit
      - name: 语法编译
        run: python -m compileall -q mingli_bench
      - name: 代码规范检查（ruff，仅提示不阻断）
        continue-on-error: true
        run: ruff check .
      - name: 依赖安全扫描（pip-audit，仅提示不阻断）
        continue-on-error: true
        run: pip-audit -r requirements.txt
